<p>Пропоную широкий спектр послуг:</p>

<ul>
  <li>продаж, купівля та оренда нерухомості в місті та на його околицях;</li>
  <li>безкоштовна консультація по всіх питаннях щодо ринку нерухомості;</li>
  <li>пошук, підбір нерухомості, ознайомлення з об’єктами нерухомості;</li>
  <li>допомога в підготовці та перевірці документів.</li>
</ul>
